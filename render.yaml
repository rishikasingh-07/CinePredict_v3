# render.yaml — Render Blueprint
# Defines both the Flask backend and React frontend as Render services.
# Push this file to the root of your GitHub repo, then connect on render.com.

services:

  # ── Flask Backend (Web Service) ────────────────────────────
  - type: web
    name: cinepredict-backend
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_DEBUG
        value: false
      # Set your Gemini API key in the Render dashboard (Environment tab).
      # Leave blank to use mock suggestions.
      - key: GEMINI_API_KEY
        sync: false
      # Set this to your frontend Render URL after the frontend is deployed.
      # e.g. https://cinepredict-frontend.onrender.com
      - key: ALLOWED_ORIGINS
        value: "*"

  # ── React Frontend (Static Site) ──────────────────────────
  - type: web
    name: cinepredict-frontend
    env: static
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      # Set this to your backend Render URL after the backend is deployed.
      # e.g. https://cinepredict-backend.onrender.com
      - key: VITE_API_BASE_URL
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
